  #     secondaryColor: "#212529"

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    # brandLogo: "/logo.png" # Logo for the brand | default is the favicon variable
    showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName: "Michael's Profle" # Brand name for the brand | default is the title variable
    disableSearch: false
    # searchPlaceholder: "Search"
    stickyNavBar:
      enable : true
      showOnScrollUp : true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Michael"
    subtitle: "I like Linux, servers, and automation"
    content: "As a United States Air Force intelligence analyst transitioning into DevOps, I have unique insight into security best practices"
    image: /images/hero.jpg
    bottomImage:
      enable: true
    # roundImage: true # Make hero image circular | default false
    button:
      enable: true
      name: "Resume"
      url: "/michael-resume.pdf"
      download: true
      newPage: true
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/That1LinuxGuy
        - icon: fab fa-linkedin
          url: https://www.linkedin.com/in/michael-allen-58aa66158/
      # customIcons:
        # - icon: /fav.png
        #   url: "https://example.com"

  # About
  about:
    enable: true
    title: "About Me"
    # image: "/images/me.png"
    content: |-
      I am a Security-Cleared Intelligence Analyst with experience managing high-stakes data in mission-critical environments, transitioning into DevOps. I have hands-on background with Linux systems, Docker containerization, and Kubernetes orchestration. I have a passion for rapidly mastering new technologies and building reliable infrastructurefor others to use.

      I am currently building a local kubernetes cluster to practice my skills. This website is hosted directly from my own three node cluster

    skills:
      enable: true
      title: "Here are a few technologies I've been working with recently:"
      items:
       - "NixOS"
       - "K3S"
       - "Docker"
       - "Bash"
       - "Github Actions"
       - "fluxCD"
  # Experience
  experience:
    enable: true
    # title: "Custom Name"
    items:
      - company: "Homelab"
        companyUrl: "https://michael.713602.xyz"
        jobs:
          - name: "Lead Architect and Administrator"
            date: "2024 - present"
            content: "I am currently managing my own home servers from end-to-end, building robust systems, High Availability Infrastructure, and adding useful services on top for 'customers'"
            info:
              content: Working as a Lead Architect and Administrator
            featuredItems:
              fontAwesomeIcons:
                - icon: fa-brands fa-github
                  url: https://github.com/That1LinuxGuy/Resume
#                  tooltip: Example tooltip content
#                - icon: fab fa-x-twitter
#                  url: https://example.com
#                  # tooltip: Example tooltip content
#              customIcons:
#                - icon: /fav.png
#                  url: "https://example.com"
#                  tooltip: Example tooltip content

      - company: "United Stated Air Force"
        # companyUrl: https://www.airforce.com/careers/intelligence/cryptologic-language-analyst 
        jobs:
          - name: "Administrative Clerk"
            date: "Oct 2025 to Present"
            info:
              content: 
            content: |
              I tracked accountability across 4 divisions for nearly 300 people. Additionally, I implemented automatic tracking of training pipelines, keys, and inbound/outbound members.
          - name: "Team Lead and Trainer"
            date: "Jun 2023 to Oct 2025"
            info:
              content: 
            content: |
              I managed up to 15 personnel and regularly liaised with partner agencies to ensure unified lines of effort. Additionally, I dedicated over 200 hours training new military members, ensuring fully qualified phase 1 analysts were able to utilize Agency and IC Tools 
          - name: "Cryptologic Language Analyst"
            date: "Jan 2021 to Jun 2023"
            info: 
              content:
            content: |
              I conducted comprehensive target research and analysis, identifying key communications and essential elements of information within 6 global networks. Additionally, I certified as a reporter, disseminating signals intelligence reports, ensuring accurate and timely information for stakeholders.

      - company: "Prevent Fire Safety"
        # companyUrl: "https://example.com"
        jobs: 
        - name: "Firestop Technician"
          date: "Apr 2020 to Dec 2020"
          content: |
            I executed precise installation of STI Firestop systems within high-stakes healthcare environments. Additionally, I conducted above-ceiling inspections and remediation, applying intumescent materials to prevent the spread of fire, smoke, and toxic gases across critical building partitions.

      - company: "Tom Thumb"
        companyUrl: "https://local.tomthumb.com/tx/hurst/612-grapevine-hwy.html"
        jobs:
        - name: "Front-End Associate / Cashier"
          date: "2015 – 2017"
          content: |
            I provided efficient service in a high-volume retail environment, managed daily cash drawers and transactions, and collaborated with department leads to streamline checkout processes during peak hours.

